name: Release

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test ./...

      - name: Build binaries
        run: |
          mkdir -p dist
          GOOS=linux   GOARCH=amd64  go build -o dist/steg-linux-amd64    ./cmd/steg
          GOOS=linux   GOARCH=arm64  go build -o dist/steg-linux-arm64    ./cmd/steg
          GOOS=darwin  GOARCH=amd64  go build -o dist/steg-darwin-amd64   ./cmd/steg
          GOOS=darwin  GOARCH=arm64  go build -o dist/steg-darwin-arm64   ./cmd/steg
          GOOS=windows GOARCH=amd64  go build -o dist/steg-windows-amd64.exe ./cmd/steg

      - name: Compute release tag
        id: tag
        run: |
          echo "tag=master-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: master ${{ steps.tag.outputs.tag }}
          body: |
            Automated release from commit ${{ github.sha }}

            ${{ github.event.head_commit.message }}
          files: dist/*
